name: Build Codex Web APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Node dependencies
        run: pnpm install --ignore-scripts

      - name: Build frontend (Vue) and CLI
        run: pnpm run build

      - name: Copy build artifacts to Android assets
        run: |
          ANDROID_ASSETS="android/app/src/main/assets/server-bundle"
          rm -rf "$ANDROID_ASSETS"
          mkdir -p "$ANDROID_ASSETS/dist"
          mkdir -p "$ANDROID_ASSETS/dist-cli"
          cp -r dist/* "$ANDROID_ASSETS/dist/"
          cp -r dist-cli/* "$ANDROID_ASSETS/dist-cli/"
          cp package.json "$ANDROID_ASSETS/package.json"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK with version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APK=$(find android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            DIR=$(dirname "$APK")
            mv "$APK" "$DIR/CodexWebLocal-v${VERSION}.apk"
            echo "Renamed to $DIR/CodexWebLocal-v${VERSION}.apk"
          else
            echo "No APK found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexWebLocal-APK
          path: android/app/build/outputs/apk/release/CodexWebLocal-*.apk

      - name: Check APK size
        run: ls -lh android/app/build/outputs/apk/release/CodexWebLocal-*.apk
